spring:
  profiles:
    active: test
  datasource:
    url: jdbc:h2:mem:techstack-insight;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop

app:
  ingestion:
    run-on-startup: false
    scheduler-enabled: false
    scheduler-cron: "0 0 3 * * *"

