spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baselineOnMigrate: true
    baselineVersion: 0

app:
  ingestion:
    run-on-startup: ${APP_INGESTION_RUN_ON_STARTUP:true}
    scheduler-enabled: ${APP_INGESTION_SCHEDULER_ENABLED:true}
    scheduler-cron: ${APP_INGESTION_SCHEDULER_CRON:0 0 3 * * *}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:true}
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:true}

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN

