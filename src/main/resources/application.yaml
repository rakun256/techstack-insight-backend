spring:
  application:
    name: techstack-insight-backend
  profiles:
    default: dev

  sql:
    init:
      mode: never

  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  port: ${PORT:8080}
  shutdown: graceful

integration:
  greenhouse:
    base-url: ${GREENHOUSE_BASE_URL:https://boards-api.greenhouse.io}
    jobs-path: ${GREENHOUSE_JOBS_PATH:/v1/boards/{boardToken}/jobs}
  lever:
    base-url: ${LEVER_BASE_URL:https://api.lever.co}
    postings-path: ${LEVER_POSTINGS_PATH:/v0/postings/{companyToken}}

app:
  ingestion:
    sources:
      - type: GREENHOUSE
        token: vercel
        enabled: true
      - type: GREENHOUSE
        token: postman
        enabled: true
      - type: GREENHOUSE
        token: figma
        enabled: true
      - type: GREENHOUSE
        token: datadog
        enabled: true
      - type: GREENHOUSE
        token: okta
        enabled: true
      - type: GREENHOUSE
        token: workato
        enabled: true
      - type: LEVER
        token: plaid
        enabled: true
      - type: LEVER
        token: patsnap
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

