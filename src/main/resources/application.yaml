spring:
  application:
    name: techstack-insight-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/techstack_insight}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never

server:
  port: 8080

integration:
  greenhouse:
    base-url: ${GREENHOUSE_BASE_URL:https://boards-api.greenhouse.io}
    jobs-path: ${GREENHOUSE_JOBS_PATH:/v1/boards/{boardToken}/jobs}
  lever:
    base-url: ${LEVER_BASE_URL:https://api.lever.co}
    postings-path: ${LEVER_POSTINGS_PATH:/v0/postings/{companyToken}}
