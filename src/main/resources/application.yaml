spring:
  application:
    name: techstack-insight-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    jpa:
      hibernate:
        ddl-auto: update   # geliştirme için
      show-sql: true
      properties:
        hibernate:
          format_sql: true

    sql:
      init:
        mode: always

server:
  port: 8080